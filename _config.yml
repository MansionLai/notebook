title: MansionLai's Notebook
description: 個人技術學習筆記，涵蓋 Kubernetes、Home Assistant 等主題
remote_theme: just-the-docs/just-the-docs@v0.10.0

url: "https://mansionlai.github.io"
baseurl: "/notebook"

# Mermaid diagram support
mermaid:
  version: "10.9.0"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Navigation
nav_sort: case_sensitive

# Aux links (top-right corner)
aux_links:
  "GitHub ↗":
    - "https://github.com/MansionLai/notebook"
aux_links_new_tab: true

# Footer
footer_content: "MansionLai's Personal Notebook · Powered by <a href=\"https://just-the-docs.com\">Just the Docs</a>"

# Exclude internal folders from Jekyll build
exclude:
  - agents/
  - docs/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
