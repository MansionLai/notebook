<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 790" width="960" height="790">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    <marker id="arr-cyan" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#00d4ff"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#00ff88"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#ff6b35"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#a855f7"/>
    </marker>
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text { font-family: "Courier New", Courier, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="790" fill="#0f0f1a"/>
  <rect width="960" height="790" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#00d4ff" filter="url(#glow-c)">Mac Mini M4 · K8s 三節點 Cluster</text>
  <text x="480" y="47" text-anchor="middle" font-size="11" fill="#64748b">Apple M4 · 10C/24GB · macOS 15 · Ubuntu 24.04 ARM64 · Kubernetes 1.32 · Cilium CNI 172.46.0.0/16</text>

  <!-- ── HOST CONTAINER ─────────────────────────────── -->
  <rect x="10" y="58" width="940" height="590" rx="8" fill="#0a0a18" stroke="#334155" stroke-width="1.5" stroke-dasharray="7,3"/>
  <rect x="10" y="58" width="160" height="20" rx="4" fill="#1e293b"/>
  <text x="20" y="72" font-size="10" fill="#94a3b8">🖥  Mac Mini Host</text>

  <!-- ══════════════════════════════════════════════════
       MASTER NODE  x:20-305  y:75-530
  ══════════════════════════════════════════════════ -->
  <rect x="20" y="75" width="285" height="455" rx="6" fill="#08081a" stroke="#00d4ff" stroke-width="1.8"/>
  <!-- header -->
  <rect x="20" y="75" width="285" height="28" rx="6" fill="#00d4ff" fill-opacity="0.14"/>
  <text x="162" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#00d4ff">k8s-master</text>
  <text x="162" y="103" text-anchor="middle" font-size="9" fill="#64748b">2C / 2.5GB · 192.168.50.x</text>

  <!-- K8s CP subgroup -->
  <rect x="29" y="108" width="267" height="215" rx="4" fill="#0d0d20" stroke="#a855f7" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="39" y="122" font-size="9" fill="#a855f7">☸  K8s Control Plane</text>

  <!-- kube-apiserver -->
  <rect x="37" y="127" width="251" height="33" rx="4" fill="#1a1a30" stroke="#00d4ff" stroke-width="1"/>
  <text x="162" y="142" text-anchor="middle" font-size="11" fill="#00d4ff">kube-apiserver</text>
  <text x="162" y="154" text-anchor="middle" font-size="8" fill="#64748b">Cluster 唯一 API 入口</text>

  <!-- etcd -->
  <rect x="37" y="167" width="118" height="33" rx="4" fill="#1a1a30" stroke="#a855f7" stroke-width="1"/>
  <text x="96" y="182" text-anchor="middle" font-size="11" fill="#a855f7">etcd</text>
  <text x="96" y="194" text-anchor="middle" font-size="8" fill="#64748b">Cluster 狀態儲存</text>

  <!-- kube-scheduler -->
  <rect x="161" y="167" width="127" height="33" rx="4" fill="#1a1a30" stroke="#a855f7" stroke-width="1"/>
  <text x="224" y="182" text-anchor="middle" font-size="11" fill="#a855f7">kube-scheduler</text>
  <text x="224" y="194" text-anchor="middle" font-size="8" fill="#64748b">Pod 排程</text>

  <!-- kube-controller-manager -->
  <rect x="37" y="207" width="251" height="33" rx="4" fill="#1a1a30" stroke="#a855f7" stroke-width="1"/>
  <text x="162" y="222" text-anchor="middle" font-size="11" fill="#a855f7">kube-controller-manager</text>
  <text x="162" y="234" text-anchor="middle" font-size="8" fill="#64748b">維護期望狀態 (RS/Node/SA)</text>

  <!-- apiserver connector lines inside CP -->
  <line x1="162" y1="160" x2="162" y2="167" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="160" x2="96"  y2="160" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="96"  y1="160" x2="96"  y2="167" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="160" x2="224" y2="160" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="224" y1="160" x2="224" y2="167" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="207" x2="162" y2="200" stroke="#a855f7" stroke-width="1" opacity="0.5"/>

  <!-- Cilium (master) -->
  <rect x="29" y="330" width="128" height="33" rx="4" fill="#1a1a30" stroke="#00ff88" stroke-width="1"/>
  <text x="93" y="345" text-anchor="middle" font-size="11" fill="#00ff88">Cilium Agent</text>
  <text x="93" y="357" text-anchor="middle" font-size="8" fill="#64748b">eBPF 172.46.0.0/16</text>

  <!-- kubelet (master) -->
  <rect x="163" y="330" width="133" height="33" rx="4" fill="#1a1a30" stroke="#475569" stroke-width="1"/>
  <text x="229" y="345" text-anchor="middle" font-size="11" fill="#94a3b8">kubelet</text>
  <text x="229" y="357" text-anchor="middle" font-size="8" fill="#64748b">Node Agent</text>

  <!-- containerd (master) -->
  <rect x="29" y="371" width="267" height="26" rx="4" fill="#141428" stroke="#334155" stroke-width="1"/>
  <text x="162" y="388" text-anchor="middle" font-size="10" fill="#475569">containerd  ·  ARM64</text>

  <!-- ══════════════════════════════════════════════════
       INFRA NODE  x:335-620  y:75-530
  ══════════════════════════════════════════════════ -->
  <rect x="335" y="75" width="285" height="455" rx="6" fill="#08081a" stroke="#00ff88" stroke-width="1.8"/>
  <rect x="335" y="75" width="285" height="28" rx="6" fill="#00ff88" fill-opacity="0.12"/>
  <text x="477" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#00ff88">k8s-infra</text>
  <text x="477" y="103" text-anchor="middle" font-size="9" fill="#64748b">2C / 2.5GB · 192.168.50.x</text>

  <!-- CoreDNS -->
  <rect x="343" y="112" width="128" height="33" rx="4" fill="#1a1a30" stroke="#00ff88" stroke-width="1"/>
  <text x="407" y="127" text-anchor="middle" font-size="11" fill="#00ff88">CoreDNS</text>
  <text x="407" y="139" text-anchor="middle" font-size="8" fill="#64748b">Cluster DNS</text>

  <!-- Ingress-nginx -->
  <rect x="477" y="112" width="135" height="33" rx="4" fill="#1a1a30" stroke="#00ff88" stroke-width="1"/>
  <text x="544" y="127" text-anchor="middle" font-size="11" fill="#00ff88">Ingress-nginx</text>
  <text x="544" y="139" text-anchor="middle" font-size="8" fill="#64748b">外部流量入口</text>

  <!-- Metrics Server -->
  <rect x="343" y="152" width="128" height="33" rx="4" fill="#1a1a30" stroke="#00ff88" stroke-width="1"/>
  <text x="407" y="167" text-anchor="middle" font-size="11" fill="#00ff88">Metrics Server</text>
  <text x="407" y="179" text-anchor="middle" font-size="8" fill="#64748b">HPA / VPA</text>

  <!-- Prometheus -->
  <rect x="477" y="152" width="135" height="33" rx="4" fill="#1a1a30" stroke="#ff6b35" stroke-width="1"/>
  <text x="544" y="167" text-anchor="middle" font-size="11" fill="#ff6b35">Prometheus</text>
  <text x="544" y="179" text-anchor="middle" font-size="8" fill="#64748b">Cluster 監控</text>

  <!-- Grafana -->
  <rect x="343" y="192" width="128" height="33" rx="4" fill="#1a1a30" stroke="#ff6b35" stroke-width="1"/>
  <text x="407" y="207" text-anchor="middle" font-size="11" fill="#ff6b35">Grafana</text>
  <text x="407" y="219" text-anchor="middle" font-size="8" fill="#64748b">視覺化儀表板</text>

  <!-- Cilium (infra) -->
  <rect x="477" y="192" width="135" height="33" rx="4" fill="#1a1a30" stroke="#00ff88" stroke-width="1"/>
  <text x="544" y="207" text-anchor="middle" font-size="11" fill="#00ff88">Cilium Agent</text>
  <text x="544" y="219" text-anchor="middle" font-size="8" fill="#64748b">eBPF CNI</text>

  <!-- kubelet (infra) -->
  <rect x="343" y="232" width="269" height="33" rx="4" fill="#1a1a30" stroke="#475569" stroke-width="1"/>
  <text x="477" y="247" text-anchor="middle" font-size="11" fill="#94a3b8">kubelet</text>
  <text x="477" y="259" text-anchor="middle" font-size="8" fill="#64748b">Node Agent</text>

  <!-- containerd (infra) -->
  <rect x="343" y="272" width="269" height="26" rx="4" fill="#141428" stroke="#334155" stroke-width="1"/>
  <text x="477" y="289" text-anchor="middle" font-size="10" fill="#475569">containerd  ·  ARM64</text>

  <!-- ══════════════════════════════════════════════════
       WORKER NODE  x:650-935  y:75-530
  ══════════════════════════════════════════════════ -->
  <rect x="650" y="75" width="285" height="455" rx="6" fill="#08081a" stroke="#ff6b35" stroke-width="1.8"/>
  <rect x="650" y="75" width="285" height="28" rx="6" fill="#ff6b35" fill-opacity="0.12"/>
  <text x="792" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff6b35">k8s-worker</text>
  <text x="792" y="103" text-anchor="middle" font-size="9" fill="#64748b">2C / 2GB · 192.168.50.x</text>

  <!-- App Workloads group -->
  <rect x="658" y="108" width="269" height="155" rx="4" fill="#0d0d20" stroke="#ff6b35" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="668" y="122" font-size="9" fill="#ff6b35">📦  App Workloads</text>

  <!-- Pod 1 -->
  <rect x="664" y="128" width="76" height="45" rx="4" fill="#1a1a30" stroke="#ff6b35" stroke-width="1"/>
  <text x="702" y="147" text-anchor="middle" font-size="11" fill="#ff6b35">Pod 1</text>
  <text x="702" y="160" text-anchor="middle" font-size="8" fill="#64748b">ARM64</text>

  <!-- Pod 2 -->
  <rect x="754" y="128" width="76" height="45" rx="4" fill="#1a1a30" stroke="#ff6b35" stroke-width="1"/>
  <text x="792" y="147" text-anchor="middle" font-size="11" fill="#ff6b35">Pod 2</text>
  <text x="792" y="160" text-anchor="middle" font-size="8" fill="#64748b">ARM64</text>

  <!-- Pod 3 -->
  <rect x="844" y="128" width="76" height="45" rx="4" fill="#1a1a30" stroke="#ff6b35" stroke-width="1"/>
  <text x="882" y="147" text-anchor="middle" font-size="11" fill="#ff6b35">Pod 3</text>
  <text x="882" y="160" text-anchor="middle" font-size="8" fill="#64748b">ARM64</text>

  <!-- Pod network range note -->
  <text x="792" y="196" text-anchor="middle" font-size="9" fill="#00ff88">Pod CIDR: 172.46.0.0/16</text>
  <text x="792" y="212" text-anchor="middle" font-size="9" fill="#64748b">Service: 10.96.0.0/12</text>
  <text x="792" y="228" text-anchor="middle" font-size="8" fill="#475569">eBPF replaces kube-proxy</text>

  <!-- Cilium (worker) -->
  <rect x="658" y="272" width="128" height="33" rx="4" fill="#1a1a30" stroke="#00ff88" stroke-width="1"/>
  <text x="722" y="287" text-anchor="middle" font-size="11" fill="#00ff88">Cilium Agent</text>
  <text x="722" y="299" text-anchor="middle" font-size="8" fill="#64748b">eBPF datapath</text>

  <!-- kubelet (worker) -->
  <rect x="792" y="272" width="133" height="33" rx="4" fill="#1a1a30" stroke="#475569" stroke-width="1"/>
  <text x="858" y="287" text-anchor="middle" font-size="11" fill="#94a3b8">kubelet</text>
  <text x="858" y="299" text-anchor="middle" font-size="8" fill="#64748b">Node Agent</text>

  <!-- containerd (worker) -->
  <rect x="658" y="312" width="269" height="26" rx="4" fill="#141428" stroke="#334155" stroke-width="1"/>
  <text x="792" y="329" text-anchor="middle" font-size="10" fill="#475569">containerd  ·  ARM64</text>

  <!-- ══════════════════════════════════════════════════
       CROSS-NODE CONNECTIONS
  ══════════════════════════════════════════════════ -->
  <!-- Infra kubelet → Master apiserver (dashed cyan, routes through y=540) -->
  <path d="M 477 265 L 477 545 L 162 545 L 162 160" stroke="#00d4ff" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-cyan)"/>
  <rect x="272" y="538" width="135" height="14" rx="2" fill="#0a0a18"/>
  <text x="339" y="549" text-anchor="middle" font-size="9" fill="#00d4ff">kubelet registers</text>

  <!-- Worker kubelet → Master apiserver (dashed cyan) -->
  <path d="M 792 305 L 792 555 L 162 555 L 162 160" stroke="#00d4ff" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-cyan)"/>

  <!-- Ingress → Worker pods (green) -->
  <path d="M 612 128 L 635 128 L 635 150 L 650 150" stroke="#00ff88" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <rect x="618" y="121" width="60" height="14" rx="2" fill="#0a0a18"/>
  <text x="648" y="131" text-anchor="middle" font-size="8" fill="#00ff88">routes traffic</text>

  <!-- ══════════════════════════════════════════════════
       MULTIPASS DAEMON
  ══════════════════════════════════════════════════ -->
  <rect x="20" y="562" width="920" height="75" rx="6" fill="#111128" stroke="#334155" stroke-width="1.2"/>
  <text x="480" y="590" text-anchor="middle" font-size="14" font-weight="bold" fill="#94a3b8">Multipass Daemon</text>
  <text x="480" y="608" text-anchor="middle" font-size="10" fill="#475569">Apple Hypervisor Framework  ·  Bridge Network → en0  ·  192.168.50.x/24 (DHCP)</text>
  <text x="480" y="624" text-anchor="middle" font-size="9" fill="#334155">multipass launch ubuntu:24.04 --cpus N --memory NG --network en0</text>

  <!-- Multipass → VM vertical tick lines -->
  <line x1="162" y1="562" x2="162" y2="530" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="477" y1="562" x2="477" y2="530" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="792" y1="562" x2="792" y2="530" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- HOST box bottom -->
  <!-- (already drawn above, the rect covers to y=648) -->

  <!-- ══════════════════════════════════════════════════
       EXTERNAL ACTORS
  ══════════════════════════════════════════════════ -->
  <!-- User -->
  <circle cx="160" cy="690" r="22" fill="#0d1117" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="160" y="686" text-anchor="middle" font-size="14" fill="#00d4ff">👤</text>
  <text x="160" y="703" text-anchor="middle" font-size="10" fill="#e2e8f0">User</text>
  <text x="160" y="718" text-anchor="middle" font-size="8" fill="#64748b">HTTPS → Ingress</text>

  <!-- User → Ingress arrow -->
  <path d="M 160 668 L 160 654 L 544 654 L 544 647" stroke="#00d4ff" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- Admin -->
  <circle cx="480" cy="690" r="22" fill="#0d1117" stroke="#a855f7" stroke-width="1.5"/>
  <text x="480" y="686" text-anchor="middle" font-size="14" fill="#a855f7">👤</text>
  <text x="480" y="703" text-anchor="middle" font-size="10" fill="#e2e8f0">Admin</text>
  <text x="480" y="718" text-anchor="middle" font-size="8" fill="#64748b">kubectl / virtctl</text>

  <!-- Admin → apiserver arrow -->
  <path d="M 480 668 L 480 660 L 162 660 L 162 647" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>

  <!-- ══════════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════ -->
  <rect x="650" y="650" width="290" height="118" rx="4" fill="#0d1117" stroke="#334155" stroke-width="1"/>
  <text x="795" y="667" text-anchor="middle" font-size="10" fill="#64748b">Legend</text>

  <line x1="663" y1="680" x2="693" y2="680" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-cyan)"/>
  <text x="700" y="684" font-size="9" fill="#94a3b8">kubelet registers to apiserver</text>

  <line x1="663" y1="698" x2="693" y2="698" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="700" y="702" font-size="9" fill="#94a3b8">Ingress routes to Worker</text>

  <line x1="663" y1="716" x2="693" y2="716" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="700" y="720" font-size="9" fill="#94a3b8">User HTTPS → Ingress</text>

  <line x1="663" y1="734" x2="693" y2="734" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="700" y="738" font-size="9" fill="#94a3b8">Admin kubectl → apiserver</text>

  <line x1="663" y1="752" x2="693" y2="752" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="700" y="756" font-size="9" fill="#94a3b8">Multipass VM lifecycle</text>
</svg>
